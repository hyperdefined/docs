{% extends "base.html" %}

{% block extrahead %}
{% set title = config.site_name %}
<link rel="apple-touch-icon" sizes="180x180" href="https://hyper.lol/assets/images/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="https://hyper.lol/assets/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="https://hyper.lol/assets/images/favicon-16x16.png">
<meta name="apple-mobile-web-app-title" content="docs.hyper.lol" />
<script defer data-domain="docs.hyper.lol" src="https://plausible.canine.tools/js/script.js"></script>
<meta property="twitter:image" content="https://api.canine.tools/wolf/4f341903aff7ad106604702784c7910b7d6daec0fd2f839b0367dd7f68bca4df/raw">
<meta name="twitter:card" content="summary_large_image">

{% if page and page.title and not page.is_homepage %}
    <meta property="og:title" content="{{ title }} - {{ page.title | striptags }}" />
    <meta name="twitter:title" content="{{ title }} - {{ page.title | striptags }}" />
  {% else %}
    <meta property="og:title" content="{{ title }}" />
    <meta name="twitter:title" content="{{ title }}" />
{% endif %}

<meta name="theme-color" content="#111111">

<meta property="og:type" content="website">
<meta property="og:url" content="{{ page.canonical_url }}">
<meta property="og:image" content="https://api.canine.tools/wolf/4f341903aff7ad106604702784c7910b7d6daec0fd2f839b0367dd7f68bca4df/raw">
<meta property="og:image:type" content="image/png" />

{% if page and page.meta and page.meta.description %}
    <meta property="og:description" content="{{ page.meta.description }}" />
    <meta name="twitter:description" content="{{ page.meta.description }}" />
  {% else %}
    <meta property="og:description" content="{{ config.site_description }}" />
    <meta name="twitter:description" content="{{ config.site_description }}" />
{% endif %}
{% endblock %}
